name: Extension Tests

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  visual-studio-extension-tests:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore src/DbSqlLikeMem.slnx

      - name: Build
        run: dotnet build src/DbSqlLikeMem.slnx --configuration Release --no-restore

      - name: Test Visual Studio extension suite
        run: python scripts/run_solution_tests.py --solution src/DbSqlLikeMem.slnx --framework net472 --configuration Release --no-build
